<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradientes suaves que simulan el desenfoque sin consumir recursos de CPU/GPU -->
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#6a11cb" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6a11cb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="grad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#43e97b" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#fa709a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fa709a" stop-opacity="0"/>
    </radialGradient>

    <style>
      .aura1 {
        transform-origin: 50% 50%;
        animation: move1 40s linear infinite alternate;
      }
      .aura2 {
        transform-origin: 50% 50%;
        animation: move2 50s linear infinite alternate;
      }

      /* Movimientos más sutiles y fáciles de procesar para el navegador */
      @keyframes move1 {
        0% { transform: translate(-300px, -50px) scale(1) rotate(0deg); }
        100% { transform: translate(400px, 50px) scale(1.3) rotate(5deg); }
      }
      @keyframes move2 {
        0% { transform: translate(400px, 50px) scale(1.1) rotate(0deg); }
        100% { transform: translate(-200px, -50px) scale(0.9) rotate(-5deg); }
      }
    </style>
  </defs>

  <!-- Fondo oscuro -->
  <rect width="100%" height="100%" fill="#02040a" />
  
  <!-- Círculos con gradiente sin el filtro pesado -->
  <ellipse cx="500" cy="100" rx="900" ry="400" fill="url(#grad1)" class="aura1" />
  <ellipse cx="1500" cy="50" rx="1000" ry="500" fill="url(#grad2)" class="aura2" />
  <ellipse cx="2500" cy="150" rx="900" ry="400" fill="url(#grad1)" class="aura1" />
</svg>
