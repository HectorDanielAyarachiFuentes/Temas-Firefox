<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="125">
  <defs>
    <style>
      /* Embedded Animations and Styles */
      #progress-time-fill {
          animation-name: progress-fill; 
          animation-timing-function: linear; 
          animation-iteration-count: infinite;
          animation-duration: 20s;
      }

      /* Death */
      #death-group {
          transform-box: view-box;
          animation-name: walk;
          animation-timing-function: ease; 
          animation-iteration-count: infinite;
          animation-duration: 20s;
      }

      #death-arm {
          animation: move-arm 3s ease infinite;
          transform-origin: -60px 74px;
      }

      #death-tool {
          animation: move-tool 3s ease infinite;
          transform-origin: -48px center;
      }

      /* Designer */
      #designer-arm-grop {
          animation: write 1.5s ease infinite;
          transform: translate(0, 0) rotate(0deg) scale(1, 1);
          transform-origin: 505.875px 64.875px;
      }

      /* Flames */
      #red-flame {
          opacity: 0;
          animation: show-flames 20s ease infinite, red-flame 120ms ease infinite;
          transform-origin: center bottom;
      }

      #yellow-flame {
          opacity: 0;
          animation: show-flames 20s ease infinite, yellow-flame 120ms ease infinite;
          transform-origin: center bottom;
      }

      #white-flame {
          opacity: 0;
          animation: show-flames 20s ease infinite, red-flame 100ms ease infinite;
          transform-origin: center bottom;
      }

      @keyframes progress-fill {
          0% {
              x: -100%;
          }
          100% {
              x: -150px;
          }
      }

      @keyframes walk {
          0% {
              transform: translateX(0px);
          }
          10% {
              transform: translateX(calc((100% - 150px) * 0.192));
          }
          15% {
              transform: translateX(calc((100% - 150px) * 0.269));
          }
          25% {
              transform: translateX(calc((100% - 150px) * 0.327));
          }
          35% {
              transform: translateX(calc((100% - 150px) * 0.423));
          }
          45% {
              transform: translateX(calc((100% - 150px) * 0.538));
          }
          55% {
              transform: translateX(calc((100% - 150px) * 0.654));
          }
          65% {
              transform: translateX(calc((100% - 150px) * 0.712));
          }
          75% {
              transform: translateX(calc((100% - 150px) * 0.827));
          }
          85% {
              transform: translateX(calc((100% - 150px) * 0.885));
          }
          100% {
              transform: translateX(calc(100% - 150px));
          }
      }

      @keyframes move-arm {
          0% {
              transform: rotate(0);
          }
          5% {
              transform: rotate(0);
          }
          9% {
              transform: rotate(40deg);
          }
          80% {
              transform: rotate(0);
          }
      }

      @keyframes move-tool {
          0% {
              transform: rotate(0);
          }
          5% {
              transform: rotate(0);
          }
          9% {
              transform: rotate(50deg);
          }
          80% {
              transform: rotate(0);
          }
      }

      @keyframes write {
          0% {
              transform: translate(0, 0) rotate(0deg) scale(1, 1);
          }
          16% {
              transform: translate(0px, 0px) rotate(5deg) scale(0.8, 1);
          }
          32% {
              transform: translate(0px, 0px) rotate(0deg) scale(1, 1);
          }
          48% {
              transform: translate(0px, 0px) rotate(6deg) scale(0.8, 1);
          }
          65% {
              transform: translate(0px, 0px) rotate(0deg) scale(1, 1);
          }
          83% {
              transform: translate(0px, 0px) rotate(4deg) scale(0.8, 1);
          }
          100% {
              transform: translate(0, 0) rotate(0deg) scale(1, 1);
          }
      }


      @keyframes show-flames {
          0% {
              opacity: 0;
          }
          74% {
              opacity: 0;
          }
          80% {
              opacity: 1;
          }
          99% {
              opacity: 1;
          }
          100% {
              opacity: 0;
          }
      }

      @keyframes red-flame {
          0% {
              transform: translateY(-30px) scale(1, 1);
          }
          25% {
              transform: translateY(-30px) scale(1.1, 1.1);
          }
          75% {
              transform: translateY(-30px) scale(0.8, 0.7); 
          }
          100% {
              transform: translateY(-30px) scale(1, 1); 
          }
      }

      @keyframes yellow-flame {
          0% {
              transform: translateY(-30px) scale(0.8, 0.7);
          }
          50% {
              transform: translateY(-30px) scale(1.1, 1.2);
          }
          100% {
              transform: translateY(-30px) scale(1, 1);
          }
      }
    </style>
  </defs>
 
  <!-- Black Background to match design -->
  <rect width="100%" height="125" fill="#000000" />
 
  <!-- White floor line covering full screen width -->
  <rect x="0" y="118" width="100%" height="27" fill="#FFFFFF" />
 
  <!-- Red progress fill rectangle covering full screen width -->
  <rect id="progress-time-fill" x="-100%" y="118" width="100%" height="27" fill="#BE002A" />
 
  <!-- Death character walking relative to the screen width, positioned vertically at bottom border -->
  <g id="death-group" transform="translate(0, 47)">
    <path id="death" fill="#BE002A" d="M-46.25,40.416c-5.42-0.281-8.349,3.17-13.25,3.918c-5.716,0.871-10.583-0.918-10.583-0.918 C-67.5,49-65.175,50.6-62.083,52c5.333,2.416,4.083,3.5,2.084,4.5c-16.5,4.833-15.417,27.917-15.417,27.917L-75.5,84.75 c-1,12.25-20.25,18.75-20.25,18.75s39.447,13.471,46.25-4.25c3.583-9.333-1.553-16.869-1.667-22.75 c-0.076-3.871,2.842-8.529,6.084-12.334c3.596-4.22,6.958-10.374,6.958-15.416C-38.125,43.186-39.833,40.75-46.25,40.416z M-40,51.959c-0.882,3.004-2.779,6.906-4.154,6.537s-0.939-4.32,0.112-7.704c0.82-2.64,2.672-5.96,3.959-5.583 C-39.005,45.523-39.073,48.8-40,51.959z"/>
    <path id="death-arm" fill="#BE002A" d="M-53.375,75.25c0,0,9.375,2.25,11.25,0.25s2.313-2.342,3.375-2.791 c1.083-0.459,4.375-1.75,4.292-4.75c-0.101-3.627,0.271-4.594,1.333-5.043c1.083-0.457,2.75-1.666,2.75-1.666 s0.708-0.291,0.5-0.875s-0.791-2.125-1.583-2.959c-0.792-0.832-2.375-1.874-2.917-1.332c-0.542,0.541-7.875,7.166-7.875,7.166 s-2.667,2.791-3.417,0.125S-49.833,61-49.833,61s-3.417,1.416-3.417,1.541s-1.25,5.834-1.25,5.834l-0.583,5.833L-53.375,75.25z"/>
    <path id="death-tool" fill="#BE002A" d="M-20.996,26.839l-42.819,91.475l1.812,0.848l38.342-81.909c0,0,8.833,2.643,12.412,7.414 c5,6.668,4.75,14.084,4.75,14.084s4.354-7.732,0.083-17.666C-10,32.75-19.647,28.676-19.647,28.676l0.463-0.988L-20.996,26.839z"/>
  </g>
 
  <!-- Nested fixed-width SVG to position the designer & desk relative to the right edge and fix the arm transform-origin -->
  <svg x="100%" y="0" width="581" height="125" style="overflow: visible;">
    <g transform="translate(-581, 15)">
      <g id="fire">
        <rect id="mask-fire-black" x="511" y="41" width="38" height="34"/>
        <g>
          <defs>
            <rect id="mask_fire" x="511" y="41" width="38" height="34"/>
          </defs>
          <clipPath id="mask-fire_1_">
            <rect x="511" y="41" width="38" height="34"/>
          </clipPath>
          <g id="group-fire" clip-path="url(#mask-fire_1_)">
            <path id="red-flame" fill="#B71342" d="M528.377,100.291c6.207,0,10.947-3.272,10.834-8.576 c-0.112-5.305-2.934-8.803-8.237-10.383c-5.306-1.581-3.838-7.9-0.79-9.707c-7.337,2.032-7.581,5.891-7.11,8.238 c0.789,3.951,7.56,4.402,5.077,9.48c-2.482,5.079-8.012,1.129-6.319-2.257c-2.843,2.233-4.78,6.681-2.259,9.703 C521.256,98.809,524.175,100.291,528.377,100.291z"/>
