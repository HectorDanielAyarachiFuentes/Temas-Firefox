<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="800" height="130">
  <defs>
    <!-- Brillo del Sol -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="1"/>
      <stop offset="60%" stop-color="#FFA500" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Máscara circular para la Tierra -->
    <clipPath id="earthClip">
      <circle cx="300" cy="65" r="35"/>
    </clipPath>
  </defs>

  <style>
    /* Estrellas tintineando */
    .star { 
      animation: twinkle 4s ease-in-out infinite alternate; 
      fill: #FFFFFF; 
      transform-box: fill-box; 
      transform-origin: center; 
    }
    .star1 { animation-delay: 0s; }
    .star2 { animation-delay: 1.2s; animation-duration: 3s; }
    .star3 { animation-delay: 2.5s; animation-duration: 5s; }
    
    @keyframes twinkle {
      0% { opacity: 0.1; transform: scale(0.6); }
      100% { opacity: 1; transform: scale(1.4); }
    }

    /* Latido del Sol */
    #sun-pulse { 
      animation: pulse 6s ease-in-out infinite alternate; 
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.9; }
      100% { transform: scale(1.05); opacity: 1; }
    }

    /* Giro del Sol */
    #sun-spin {
      animation: spinSun 25s linear infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes spinSun {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Rotación de los continentes de la Tierra */
    #continents { 
      animation: earthSpin 20s linear infinite; 
    }
    @keyframes earthSpin {
      0% { transform: translateX(0); }
      100% { transform: translateX(-120px); } /* Distancia exacta para crear un bucle perfecto */
    }

    /* Órbita de la Luna */
    #moon-group {
      transform-origin: 300px 65px; /* Centro de la Tierra */
      animation: moonOrbit 15s linear infinite;
    }
    @keyframes moonOrbit {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <!-- Estrellas de fondo -->
  <g id="stars">
    <circle cx="20" cy="20" r="1.5" class="star star1"/>
    <circle cx="150" cy="110" r="2" class="star star2"/>
    <circle cx="200" cy="30" r="1" class="star star3"/>
    <circle cx="250" cy="100" r="1.5" class="star star1"/>
    <circle cx="380" cy="20" r="2" class="star star2"/>
    <circle cx="450" cy="80" r="1.5" class="star star3"/>
    <circle cx="550" cy="25" r="2" class="star star1"/>
    <circle cx="620" cy="110" r="1.5" class="star star2"/>
    <circle cx="720" cy="40" r="2" class="star star3"/>
    <circle cx="780" cy="90" r="1" class="star star1"/>
    <circle cx="90" cy="80" r="1" class="star star2"/>
    <circle cx="490" cy="115" r="1.5" class="star star3"/>
    <circle cx="680" cy="15" r="1" class="star star1"/>
    <!-- Nuevas estrellas -->
    <circle cx="50" cy="90" r="1" class="star star3"/>
    <circle cx="120" cy="40" r="1.5" class="star star1"/>
    <circle cx="180" cy="70" r="1" class="star star2"/>
    <circle cx="220" cy="15" r="2" class="star star3"/>
    <circle cx="290" cy="40" r="1" class="star star1"/>
    <circle cx="340" cy="95" r="1.5" class="star star2"/>
    <circle cx="420" cy="50" r="1" class="star star3"/>
    <circle cx="510" cy="70" r="2" class="star star1"/>
    <circle cx="580" cy="40" r="1" class="star star2"/>
    <circle cx="650" cy="85" r="1.5" class="star star3"/>
    <circle cx="750" cy="115" r="1" class="star star1"/>
    <circle cx="310" cy="110" r="1" class="star star2"/>
    <circle cx="10" cy="60" r="1.5" class="star star3"/>
    <circle cx="790" cy="30" r="1" class="star star2"/>
    <circle cx="370" cy="120" r="2" class="star star1"/>
    <circle cx="590" cy="125" r="1" class="star star3"/>
    <circle cx="100" cy="15" r="1" class="star star2"/>
    <circle cx="270" cy="75" r="1.5" class="star star1"/>
    <circle cx="470" cy="25" r="1" class="star star3"/>
    <circle cx="690" cy="65" r="1.5" class="star star2"/>
  </g>

  <!-- Sol brillante -->
  <g id="sun-pulse">
    <g id="sun-spin">
      <!-- Resplandor base (ligeramente elíptico para que se note el giro) -->
      <ellipse cx="60" cy="50" rx="55" ry="45" fill="url(#sunGlow)"/>
      <ellipse cx="60" cy="50" rx="45" ry="55" fill="url(#sunGlow)" opacity="0.5"/>
      <!-- Centro brillante -->
      <circle cx="60" cy="50" r="25" fill="#FFF5BA"/>
      <!-- Manchas Solares sutiles -->
      <g id="sunspots">
        <!-- Grupo de manchas en la parte inferior derecha -->
        <path d="M 65,55 C 68,52 72,55 70,61 C 68,66 63,64 62,59 C 61,56 63,54 65,55 Z" fill="#E67E22" opacity="0.3"/>
        <path d="M 66,56 C 68,55 70,57 69,60 C 67,62 65,60 65,58 Z" fill="#D35400" opacity="0.4"/>
        
        <path d="M 73,50 Q 76,49 76,53 Q 75,56 72,55 Q 69,54 71,51 Z" fill="#E67E22" opacity="0.3"/>
        <path d="M 74,51 Q 75,51 75,53 Q 74,54 73,52 Z" fill="#D35400" opacity="0.4"/>

        <!-- Pequeña mancha aislada en la parte media izquierda -->
        <path d="M 45,45 Q 47,44 46,46 Q 45,48 43,46 Z" fill="#D35400" opacity="0.3"/>
      </g>
    </g>
  </g>

  <!-- Grupo orbital de la Luna -->
  <g id="moon-group">
    <!-- La luna está posicionada a la izquierda, luego orbita usando rotate -->
    <circle cx="230" cy="65" r="8" fill="#D3D3D3"/>
    <!-- Cráteres -->
    <circle cx="228" cy="63" r="2" fill="#A9A9A9" opacity="0.6"/>
    <circle cx="233" cy="67" r="1.5" fill="#A9A9A9" opacity="0.6"/>
    <circle cx="229" cy="68" r="1" fill="#A9A9A9" opacity="0.6"/>
  </g>

  <!-- Planeta Tierra -->
  <g id="earth">
    <!-- Océano base -->
    <circle cx="300" cy="65" r="35" fill="#2E86C1"/>
    
    <!-- Continentes (Enmascarados) -->
    <g clip-path="url(#earthClip)">
      <g id="continents">
        <!-- Mapa de continentes (Set 1) -->
        <g fill="#7DCEA0">
          <path d="M 280,45 Q 295,20 315,40 Q 310,65 290,55 Z"/>
          <path d="M 320,55 Q 340,50 330,70 Q 315,85 310,75 Z"/>
          <path d="M 275,70 Q 290,65 295,85 Q 280,95 270,80 Z"/>
        </g>
        
        <!-- Mapa de continentes (Set 2 desplazado en X: +120px para el bucle) -->
        <g fill="#7DCEA0">
          <path d="M 400,45 Q 415,20 435,40 Q 430,65 410,55 Z"/>
          <path d="M 440,55 Q 460,50 450,70 Q 435,85 430,75 Z"/>
          <path d="M 395,70 Q 410,65 415,85 Q 400,95 390,80 Z"/>
        </g>

        <!-- Nubes (Set 1) -->
        <g fill="#FFFFFF" opacity="0.7">
          <path d="M 270,55 Q 280,50 290,55 Q 280,60 270,55 Z"/>
          <path d="M 315,45 Q 325,40 335,45 Q 325,50 315,45 Z"/>
          <path d="M 290,80 Q 300,75 310,80 Q 300,85 290,80 Z"/>
        </g>

        <!-- Nubes (Set 2 desplazado en X: +120px) -->
        <g fill="#FFFFFF" opacity="0.7">
          <path d="M 390,55 Q 400,50 410,55 Q 400,60 390,55 Z"/>
          <path d="M 435,45 Q 445,40 455,45 Q 445,50 435,45 Z"/>
          <path d="M 410,80 Q 420,75 430,80 Q 420,85 410,80 Z"/>
        </g>
      </g>
    </g>
    
    <!-- Sombra 3D en la Tierra -->
    <path d="M 300,30 A 35,35 0 0,1 300,100 A 18,35 0 0,0 300,30" fill="#000000" opacity="0.35"/>
    <circle cx="300" cy="65" r="35" fill="none" stroke="#1A5276" stroke-width="2" opacity="0.5"/>
  </g>
  
</svg>
