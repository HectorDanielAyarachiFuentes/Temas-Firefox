<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <!-- Golden Gradient Premium -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F9E596" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>
    <filter id="elegant-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <g filter="url(#elegant-shadow)">
    <text x="770" y="100" text-anchor="end" font-family="'Montserrat', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="34" font-weight="900" letter-spacing="4" fill="url(#gold)" stroke="#8C6614" stroke-width="0.5">CAMPEONES DEL MUNDO</text>
    
    <!-- 3 Stars -->
    <g fill="url(#gold)" stroke="#8C6614" stroke-width="0.5" transform="translate(620, 115)">
      <!-- Left Star -->
      <path transform="translate(0, 0) scale(1.2)" d="M10 0L13.09 6.26L20 7.27L15 12.14L16.18 19.02L10 15.77L3.82 19.02L5 12.14L0 7.27L6.91 6.26L10 0Z" />
      <!-- Center Star (Slightly larger and higher) -->
      <path transform="translate(50, -5) scale(1.4)" d="M10 0L13.09 6.26L20 7.27L15 12.14L16.18 19.02L10 15.77L3.82 19.02L5 12.14L0 7.27L6.91 6.26L10 0Z" />
      <!-- Right Star -->
      <path transform="translate(105, 0) scale(1.2)" d="M10 0L13.09 6.26L20 7.27L15 12.14L16.18 19.02L10 15.77L3.82 19.02L5 12.14L0 7.27L6.91 6.26L10 0Z" />
    </g>
  </g>
</svg>
