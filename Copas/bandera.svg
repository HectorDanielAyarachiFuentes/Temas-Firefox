<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="4000" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.0" height="200" viewBox="0 0 4000 200">
 <rect width="4000" fill="#74acdf" height="200"/>
 <rect y="80" width="4000" fill="#fff" height="40"/>
 <g transform="translate(2000, 100)">
   <!-- Sun of May (Clean Vector) -->
   <!-- Slow elegant rotation for the rays -->
   <g>
     <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="120s" repeatCount="indefinite" />
     <g id="sun-rays" fill="#F6B40E" stroke="#B8860B" stroke-width="1.5">
       <path id="ray" d="M -3,0 L 0,-45 L 3,0 Z" />
       <use xlink:href="#ray" transform="rotate(22.5)" />
       <use xlink:href="#ray" transform="rotate(45)" />
       <use xlink:href="#ray" transform="rotate(67.5)" />
       <use xlink:href="#ray" transform="rotate(90)" />
       <use xlink:href="#ray" transform="rotate(112.5)" />
       <use xlink:href="#ray" transform="rotate(135)" />
       <use xlink:href="#ray" transform="rotate(157.5)" />
       <use xlink:href="#ray" transform="rotate(180)" />
       <use xlink:href="#ray" transform="rotate(202.5)" />
       <use xlink:href="#ray" transform="rotate(225)" />
       <use xlink:href="#ray" transform="rotate(247.5)" />
       <use xlink:href="#ray" transform="rotate(270)" />
       <use xlink:href="#ray" transform="rotate(292.5)" />
       <use xlink:href="#ray" transform="rotate(315)" />
       <use xlink:href="#ray" transform="rotate(337.5)" />
       
       <!-- Secondary rays -->
       <path id="ray2" d="M -2,0 L 0,-38 L 2,0 Z" />
       <use xlink:href="#ray2" transform="rotate(11.25)" />
       <use xlink:href="#ray2" transform="rotate(33.75)" />
       <use xlink:href="#ray2" transform="rotate(56.25)" />
       <use xlink:href="#ray2" transform="rotate(78.75)" />
       <use xlink:href="#ray2" transform="rotate(101.25)" />
       <use xlink:href="#ray2" transform="rotate(123.75)" />
       <use xlink:href="#ray2" transform="rotate(146.25)" />
       <use xlink:href="#ray2" transform="rotate(168.75)" />
       <use xlink:href="#ray2" transform="rotate(191.25)" />
       <use xlink:href="#ray2" transform="rotate(213.75)" />
       <use xlink:href="#ray2" transform="rotate(236.25)" />
       <use xlink:href="#ray2" transform="rotate(258.75)" />
       <use xlink:href="#ray2" transform="rotate(281.25)" />
       <use xlink:href="#ray2" transform="rotate(303.75)" />
       <use xlink:href="#ray2" transform="rotate(326.25)" />
       <use xlink:href="#ray2" transform="rotate(348.75)" />
     </g>
   </g>
   
   <!-- Sun core -->
   <circle r="18" fill="#F6B40E" stroke="#B8860B" stroke-width="1.5"/>
 </g>
</svg>
