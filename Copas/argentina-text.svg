<svg xmlns="http://www.w3.org/2000/svg" width="4000" height="200" viewBox="0 0 4000 200">
  <defs>
    <!-- Golden Gradient Premium -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F9E596" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>
    <filter id="elegant-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <g filter="url(#elegant-shadow)">
    <text x="30" y="112" text-anchor="start" font-family="'Montserrat', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="42" font-weight="900" letter-spacing="6" fill="url(#gold)" stroke="#8C6614" stroke-width="0.5">ARGENTINA</text>
  </g>
</svg>
