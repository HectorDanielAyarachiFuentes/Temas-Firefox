<svg xmlns="http://www.w3.org/2000/svg" width="4000" height="200" viewBox="0 0 4000 200">
  <defs>
    <!-- Golden Gradient Elegant -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F9E596" />
      <stop offset="35%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#B8860B" />
      <stop offset="65%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.85"/>
    </filter>
    <filter id="flag-wave" x="-20%" y="-20%" width="140%" height="140%">
      <!-- Generate smooth noise -->
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.02" numOctaves="1" result="noise" />
      <!-- Animate the noise phase by rotating its hue smoothly over time -->
      <feColorMatrix type="hueRotate" values="0" result="shiftedNoise">
        <animate attributeName="values" from="0" to="360" dur="4s" repeatCount="indefinite" />
      </feColorMatrix>
      <!-- Displace the text using the animated noise -->
      <feDisplacementMap in="SourceGraphic" in2="shiftedNoise" scale="6" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <!-- We nest the filters: first wave, then drop-shadow -->
  <g filter="url(#drop-shadow)">
    <g filter="url(#flag-wave)">
      <!-- text-anchor start and placed specifically at x=30 to ensure it is always on the left side of smaller screens. -->
      <text x="30" y="60" text-anchor="start" font-family="'Palatino Linotype', 'Book Antiqua', 'Georgia', serif" font-size="34" font-weight="bold" letter-spacing="4" fill="url(#gold)" stroke="#3A2800" stroke-width="1.5">ARGENTINA</text>
    </g>
  </g>
</svg>
